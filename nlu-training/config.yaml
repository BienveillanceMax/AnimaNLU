seed: 42

model:
  name: "almanach/camembertav2-base"
  max_seq_length: 64
  use_crf: true
  head_hidden_dim: 256
  gradient_checkpointing: true

training:
  learning_rate: 0.00003
  per_device_batch_size: 32
  gradient_accumulation_steps: 4
  num_epochs: 40
  early_stopping_patience: 7
  early_stopping_metric: "eval_composite_acc"
  # 10% (vs prior 6%) gives CRF transitions more time to stabilize before peak LR.
  # At crf_lr_multiplier=50 (effective LR 1.5e-3), aggressive early updates on the
  # 1,443 CRF params can overshoot if warmup is too short.
  warmup_ratio: 0.10
  weight_decay: 0.01
  max_grad_norm: 1.0
  lr_scheduler_type: "cosine"
  layer_lr_decay: 0.9
  # CRF transitions start at 0 and need aggressive learning (unlike pretrained encoder).
  # At 50x base LR (~1.5e-3), transitions develop std≥1.0 over training — enough to
  # separate legal B→I from illegal O→I by several score points.
  crf_lr_multiplier: 50.0

loss:
  weights:
    speech_act: 1.0
    domain: 1.0
    # Switched CRF reduction from 'token_mean' to 'mean' in model.py — per-sequence
    # loss is ~9x larger than per-token, so slot weight halved to keep effective
    # balance with the two classification heads.
    slots: 1.0
  focal_gamma: 1.0
  smoothing: 0.05
  # Class weighting for speech_act and domain heads.
  # 'sqrt_inverse' = weight_i ∝ 1/√count_i, normalized so mean weight = 1.0.
  # Disabled: sqrt_inverse bled Commands into Request (Command→Request 126 in
  # confusion matrix, SA acc 0.923 → 0.848). Ratio was Command n=3000 vs
  # Request n=54 → √-ratio ≈ 7.4× → normalized ~3× on Request, enough to
  # flip decision boundary on ambiguous imperatives. NegFb improvement
  # came from the 96 supplement examples, not from weighting — supplements
  # alone are the correct lever for SA imbalance.
  # Options: 'none', 'sqrt_inverse', 'inverse'
  class_weighting: none
  # Slot-label class weighting (separate because slot head goes through CRF
  # which has no per-class weight support). When set, adds a weighted CE
  # auxiliary loss on the raw slot logits, scaled by slot_emission_aux_weight.
  # Target: rare slot labels (frequency, setting_type, scene_name, artist_name
  # at ~0 F1) that never get promoted out of O by the CRF.
  # Set slot_emission_aux_weight to 0 to disable even if mode is set.
  slot_class_weighting: sqrt_inverse
  # Reverted to 0.3: aux=0.5 hurt rare-slot PRECISION by flooding emissions
  # — setting_value P=0.56/R=0.07 (F1 0.35→0.12), slot F1 regressed 0.573→0.539.
  # Only frequency improved (0.13→0.19). Aux is a balance, not a ceiling-lifter:
  # to actually promote rare slots, we need more *data* for them, not more
  # emission weight.
  slot_emission_aux_weight: 0.3

supplement_upsample_factor: 3

sonnet_social_cap: 2000

balancing:
  max_per_combo: 3500
  min_per_combo: 40

paths:
  data_dir: "data"
  output_dir: "outputs"
